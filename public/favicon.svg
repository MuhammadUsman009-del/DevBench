<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" fill="#0d1117"/>
  
  <!-- Terminal prompt symbol in green -->
  <g transform="translate(50, 60)">
    <!-- Greater than symbol -->
    <text x="0" y="40" font-size="60" font-weight="bold" font-family="'JetBrains Mono', monospace" fill="#39d353">
      &gt;
    </text>
    <!-- Underscore symbol -->
    <text x="50" y="55" font-size="50" font-weight="bold" font-family="'JetBrains Mono', monospace" fill="#39d353">
      _
    </text>
  </g>
</svg>
